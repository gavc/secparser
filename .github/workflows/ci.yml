name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    name: Build and test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore SecParser.slnx

      - name: Build
        run: dotnet build SecParser.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test SecParser.slnx --configuration Release --no-build --verbosity normal
